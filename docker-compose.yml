version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: ems-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: employeedb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ems-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ems-backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: employeedb
      JWT_SECRET: myjwtsecret123
      PORT: 5000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ems-network

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:5000
    container_name: ems-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ems-network

volumes:
  mysql-data:

networks:
  ems-network:
    driver: bridge
